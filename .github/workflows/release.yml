name: Release

on:
  push:
    tags: ['v*']

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter overlay build
      - run: cargo build --release
        working-directory: services/capture-win
      # SBOM for the evidence pack
      - uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json
      # Code signing requires the org certificate: configure WINDOWS_SIGNING_CERT /
      # WINDOWS_SIGNING_PASSWORD repo secrets, then sign svc.exe + installer here.
      # Release is blocked on signing per docs/release/branch-protection.md.
      - uses: actions/upload-artifact@v4
        with:
          name: gamepoint-${{ github.ref_name }}
          path: |
            services/capture-win/target/release/*.exe
            apps/overlay/dist/
            sbom.spdx.json
          if-no-files-found: warn
